<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Café Bar</title>
    <style>
        body { font-family: Georgia, serif; background: #f5f0eb; color: #3b2a1a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 12px; border-left: 5px solid #7b4f2e; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 300px; }
        h1 { text-align: center; margin-bottom: 25px; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; margin-bottom: 15px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #7b4f2e; color: white; border: none; border-radius: 20px; font-size: 15px; cursor: pointer; }
        button:hover { background: #3b2a1a; }
        .error { color: #c0392b; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>☕ Admin</h1>
        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}
        <form method="POST">
            <input type="password" name="password" placeholder="Contraseña" required>
            <button type="submit">Entrar</button>
        </form>
    </div>
</body>
</html>
