<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Café Bar</title>
    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body { 
        font-family: Georgia, serif; 
        background: #f5f0eb; 
        color: #3b2a1a; 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        min-height: 100vh; 
        margin: 0;
        padding: 20px;
    }

    .login-box { 
        background: white; 
        padding: 50px 40px; 
        border-radius: 16px; 
        border-left: 5px solid #7b4f2e; 
        box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
        width: 100%;
        max-width: 450px;
    }

    h1 { 
        text-align: center; 
        margin-bottom: 30px;
        font-size: 36px;
    }

    input { 
        width: 100%; 
        padding: 15px; 
        border: 2px solid #ccc; 
        border-radius: 10px; 
        font-size: 18px; 
        margin-bottom: 20px; 
        box-sizing: border-box; 
    }

    input:focus {
        border-color: #7b4f2e;
        outline: none;
    }

    button { 
        width: 100%; 
        padding: 15px; 
        background: #7b4f2e; 
        color: white; 
        border: none; 
        border-radius: 25px; 
        font-size: 18px; 
        cursor: pointer; 
    }

    button:hover { 
        background: #3b2a1a; 
    }

    .error { 
        color: #c0392b; 
        text-align: center; 
        margin-bottom: 15px;
        font-size: 16px;
    }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>☕ Admin</h1>
        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}
        <form method="POST">
            <input type="password" name="password" placeholder="Contraseña" required>
            <button type="submit">Entrar</button>
        </form>
    </div>
</body>
</html>
