<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Producto - Café Bar</title>
    <style>
        body { font-family: Georgia, serif; background: #f5f0eb; color: #3b2a1a; padding: 20px; }
        h1 { color: #3b2a1a; }
        .form-editar { background: white; padding: 25px; border-radius: 12px; max-width: 400px; border-left: 5px solid #7b4f2e; }
        input, select { padding: 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; width: 100%; margin-top: 8px; margin-bottom: 15px; }
        .btn { padding: 10px 20px; border: none; border-radius: 20px; cursor: pointer; font-size: 14px; }
        .btn-verde { background: #2ecc71; color: white; }
        .btn-volver { background: #7b4f2e; color: white; text-decoration: none; padding: 8px 14px; border-radius: 20px; font-size: 14px; }
    </style>
</head>
<body>
    <a href="/admin" class="btn-volver">← Volver al admin</a>
    <h1>✏️ Editar Producto</h1>

    <div class="form-editar">
        <form action="/admin/editar/{{ producto[0] }}" method="POST">
            
            <label>Nombre</label>
            <input type="text" name="nombre" value="{{ producto[1] }}" required>
            
            <label>Precio</label>
            <input type="number" name="precio" value="{{ producto[2] }}" required>
            
            <label>Categoría</label>
            <select name="categoria">
                <option {% if producto[3] == "Bebidas Calientes" %}selected{% endif %}>Bebidas Calientes</option>
                <option {% if producto[3] == "Bebidas Frías" %}selected{% endif %}>Bebidas Frías</option>
                <option {% if producto[3] == "Comidas" %}selected{% endif %}>Comidas</option>
                <option {% if producto[3] == "Postres" %}selected{% endif %}>Postres</option>
            </select>

            <button type="submit" class="btn btn-verde">💾 Guardar cambios</button>
        </form>
    </div>

</body>
</html>
