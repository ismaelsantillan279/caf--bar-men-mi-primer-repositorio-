<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cambiar Contraseña - Admin</title>
    <style>
        body { font-family: Georgia, serif; background: #f5f0eb; color: #3b2a1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .box { background: white; padding: 40px; border-radius: 12px; max-width: 400px; width: 100%; border-left: 5px solid #7b4f2e; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { margin-bottom: 25px; }
        label { font-size: 14px; color: #7b4f2e; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; margin-bottom: 15px; box-sizing: border-box; margin-top: 5px; }
        button { width: 100%; padding: 12px; background: #7b4f2e; color: white; border: none; border-radius: 20px; font-size: 15px; cursor: pointer; }
        button:hover { background: #3b2a1a; }
        .error { color: #c0392b; margin-bottom: 15px; font-size: 14px; }
        .exito { color: #2ecc71; margin-bottom: 15px; font-size: 14px; font-weight: bold; }
        .btn-volver { display: block; text-align: center; margin-top: 15px; color: #7b4f2e; text-decoration: none; }
    </style>
</head>
<body>
    <div class="box">
        <h1>🔑 Cambiar Contraseña</h1>

        {% if error %}
        <p class="error">⚠ {{ error }}</p>
        {% endif %}

        {% if exito %}
        <p class="exito">✅ {{ exito }}</p>
        {% endif %}

        <form method="POST">
            <label>Contraseña actual</label>
            <input type="password" name="actual" required>

            <label>Nueva contraseña</label>
            <input type="password" name="nueva" required>

            <label>Repetir nueva contraseña</label>
            <input type="password" name="repetir" required>

            <button type="submit">Guardar cambios</button>
        </form>
        <a href="/admin" class="btn-volver">← Volver al admin</a>
    </div>
</body>
</html>
